<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">NyayaLens Risks and Remedies placeholder</title>
  <desc id="desc">Synthetic placeholder showing a filterable risk table.</desc>
