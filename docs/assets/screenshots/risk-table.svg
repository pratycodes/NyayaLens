  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#293244">
    <text x="112" y="314" font-weight="700">Severity</text><text x="220" y="314" font-weight="700">Risk</text><text x="548" y="314" font-weight="700">Evidence</text><text x="790" y="314" font-weight="700">Next step</text><text x="1010" y="314" font-weight="700">View</text>
